<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Asset Participations</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
<meta name="theme-color" content="#0a0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Assets">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0f14;--card:#111820;--border:#1e293b;--border-hover:#334155;
  --text:#e2e8f0;--text-muted:#94a3b8;--text-dim:#64748b;--text-faint:#475569;
  --input-bg:#0a0f14;--heading:#f1f5f9;--bar-bg:#1e293b;
  --tab-bg:#0d1219;--tab-active:#111820;--tab-border:#2dd4bf;
  --save-bg:#14532d;--save-text:#4ade80;--save-border:#166534;
  --a-bar:#15803d;--a-text:#22c55e;--a-chip:rgba(21,128,61,0.2);
  --b-bar:#c084fc;--b-text:#c084fc;--b-chip:rgba(192,132,252,0.15);
  --c-bar:#2952cc;--c-text:#5b8af5;--c-chip:rgba(41,82,204,0.15);
  --bar-text-color:#0a0f14;--badge-text:#0a0f14;
  --pos:#4ade80;--neg:#f87171;
  --cmp-bg:#0d1a2a;--cmp-border:#1a3050;
}
.light {
  --bg:#f4f5f7;--card:#ffffff;--border:#e2e5ea;--border-hover:#cbd0d8;
  --text:#1e293b;--text-muted:#475569;--text-dim:#64748b;--text-faint:#94a3b8;
  --input-bg:#f0f1f3;--heading:#0f172a;--bar-bg:#e2e5ea;
  --tab-bg:#eaecef;--tab-active:#ffffff;--tab-border:#0d9488;
  --save-bg:#dcfce7;--save-text:#166534;--save-border:#86efac;
  --a-bar:#166534;--a-text:#14532d;--a-chip:rgba(22,101,52,0.15);
  --b-bar:#9333ea;--b-text:#7e22ce;--b-chip:rgba(147,51,234,0.15);
  --c-bar:#1e40af;--c-text:#1e3a8a;--c-chip:rgba(30,64,175,0.12);
  --bar-text-color:#fff;--badge-text:#fff;
  --pos:#16a34a;--neg:#dc2626;
  --cmp-bg:#f0f4ff;--cmp-border:#c7d6f0;
}
.light .check-box.checked{background:#d1d5db;border-color:#d1d5db}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'JetBrains Mono','SF Mono','Fira Code',monospace;padding:20px;transition:background .3s,color .3s}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
h1{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--heading)}
.subtitle{font-size:11px;color:var(--text-dim);margin-top:3px}
.header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.header-btns{display:flex;gap:4px;align-items:center}
.ico-btn{background:var(--card);border:1px solid var(--border);color:var(--text-muted);width:32px;height:32px;border-radius:6px;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;justify-content:center}
.ico-btn:hover{background:var(--border);color:var(--heading)}
.ico-btn:disabled{opacity:.25;cursor:default;pointer-events:none}
.ico-btn.save-ico{background:var(--save-bg);color:var(--save-text);border-color:var(--save-border)}
.ico-btn.save-ico:hover{filter:brightness(1.15)}
.btn-sep{width:1px;height:20px;background:var(--border);margin:0 2px}
.copy-btn{background:var(--card);border:1px solid var(--border);color:var(--text-muted);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s;line-height:1;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.copy-btn:hover{background:var(--border);color:var(--heading)}
.save-dropdown{position:relative;display:inline-block}
.save-menu{position:absolute;top:100%;right:0;margin-top:4px;background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;z-index:100;min-width:220px;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.save-menu-item{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--text-muted);transition:all .12s;border:none;background:none;width:100%;text-align:left}
.save-menu-item:hover{background:var(--border);color:var(--heading)}
.save-menu-sep{height:1px;background:var(--border)}
.sort-bar{display:flex;justify-content:flex-end;margin-bottom:10px;position:relative}
.sort-btn{background:var(--card);border:1px solid var(--border);color:var(--text-muted);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.sort-btn:hover{background:var(--border);color:var(--heading)}
.sort-btn.active-sort{color:var(--heading);border-color:var(--border-hover)}
.sort-menu{position:absolute;top:100%;right:0;margin-top:4px;background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;z-index:100;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.sort-menu-item{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:11px;font-family:inherit;cursor:pointer;color:var(--text-muted);transition:all .12s;border:none;background:none;width:100%;text-align:left}
.sort-menu-item:hover{background:var(--border);color:var(--heading)}
.sort-menu-item.sort-active{color:var(--heading);font-weight:700}
.tab-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tab-bar{display:flex;gap:0}
.tab-btn{padding:7px 14px;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);transition:all .15s;background:var(--tab-bg);color:var(--text-dim);position:relative;white-space:nowrap}
.tab-btn:first-child{border-radius:6px 0 0 6px}
.tab-btn:last-child{border-radius:0 6px 6px 0}
.tab-btn+.tab-btn{border-left:none}
.tab-btn.active{background:var(--tab-active);color:var(--heading);box-shadow:0 -2px 0 var(--tab-border) inset;z-index:1}
.tab-btn:hover:not(.active){background:var(--card);color:var(--text-muted)}
.tab-btn.cmp-tab{background:var(--cmp-bg);color:var(--tab-border);border-color:var(--cmp-border);margin-left:4px;border-left:1px solid var(--cmp-border)!important}
.tab-btn.cmp-tab.active{background:var(--tab-active);box-shadow:0 -2px 0 var(--pos) inset}
.tab-dot{width:6px;height:6px;border-radius:50%;background:var(--save-text);position:absolute;top:3px;right:3px}
.tab-input{background:transparent;border:1px solid var(--tab-border);color:var(--heading);padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;font-family:inherit;width:130px}
.tab-input:focus{outline:none}
.unified-bar{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:0;transition:all .3s}
.unified-track{display:flex;border-radius:6px;overflow:hidden;background:var(--bar-bg)}
.unified-seg{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;font-family:'Space Grotesk',sans-serif;transition:width .3s ease;position:relative;color:var(--bar-text-color);cursor:pointer;-webkit-user-select:none;user-select:none}
.unified-seg .u-pct{font-size:28px;font-weight:700;line-height:1.1;cursor:pointer}
.unified-seg .u-val{font-size:14px;font-weight:600;opacity:.85;line-height:1.1;cursor:pointer}
.unified-seg .u-lbl{font-size:11px;font-weight:700;opacity:.8;line-height:1.1;cursor:pointer}
.unified-seg.drop-hover{filter:brightness(1.3);outline:2px dashed var(--heading) inset}
.unified-delta{display:flex;justify-content:space-between;margin-top:8px;font-size:10px;font-weight:600;font-family:'Space Grotesk',sans-serif}
.color-picker{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:6px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;z-index:101;display:grid;grid-template-columns:repeat(5,28px);gap:4px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.color-swatch{width:28px;height:28px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:all .12s}
.color-swatch:hover{transform:scale(1.15);border-color:var(--heading)}
.on-edit{background:transparent;border:1px solid var(--bar-text-color);color:var(--bar-text-color);font-family:inherit;font-size:11px;font-weight:700;padding:1px 4px;border-radius:3px;width:80px;text-align:center}
.on-edit:focus{outline:none}
.color-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.4);cursor:pointer;transition:all .15s;flex-shrink:0;position:absolute;bottom:4px;right:4px;z-index:2}
.color-dot:hover{transform:scale(1.3);border-color:rgba(255,255,255,.8)}
.sticky-top{position:sticky;top:0;z-index:50;background:var(--bg);padding-bottom:6px}
.delta-pos{color:var(--pos)}.delta-neg{color:var(--neg)}.delta-zero{color:var(--text-faint)}
.asset-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:4px;transition:all .2s}
.asset-row:hover{border-color:var(--border-hover)}
.asset-row.inactive{opacity:.25;filter:grayscale(.85)}
.asset-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.check-box{width:16px;height:16px;border-radius:3px;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.check-box.checked{background:#4b5563;border-color:#4b5563}
.check-box:hover{border-color:var(--text-dim)}
.row-num{font-size:11px;color:var(--text-faint);font-weight:500;min-width:18px}
.row-name{font-size:13px;font-weight:500;color:var(--text);cursor:pointer;min-width:80px}
.name-input,.inline-input{background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:2px 5px;border-radius:3px;font-family:inherit;font-size:12px;text-align:center}
.name-input{background:transparent;padding:2px 6px;font-size:13px;width:150px;text-align:left}
.name-input:focus,.inline-input:focus{outline:none;border-color:var(--a-bar)}
.field-label{font-size:9px;color:var(--text-faint);letter-spacing:.04em}
.field-val{font-size:12px;color:var(--text-dim);cursor:pointer;padding:1px 6px;border-radius:3px;background:var(--input-bg);border:1px solid var(--border);display:inline-block}
.field-val.muted{color:var(--text-muted)}
.val-adj{width:18px;height:18px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;line-height:1;border:1px solid var(--border);background:var(--input-bg);color:var(--text-dim);transition:all .12s}
.val-adj:hover{background:var(--border);color:var(--heading)}
.spacer{flex:1}
.owners-group{display:flex;align-items:center;gap:5px}
.owner-pill{display:inline-flex;align-items:center;gap:0;border-radius:5px;overflow:hidden;transition:outline .15s}
.owner-pill.drop-hover{outline:2px dashed var(--heading);outline-offset:1px}
.adj-btn{width:16px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;line-height:1;border:none;transition:all .12s}
.adj-btn:hover{filter:brightness(1.3);transform:scale(1.1)}
.adj-btn:disabled{opacity:.2;cursor:default;transform:none;filter:none}
.owner-chip{display:inline-flex;align-items:center;font-size:11px;font-weight:600;cursor:grab;transition:all .12s;user-select:none;padding:2px 4px;gap:1px;justify-content:center;min-width:44px}
.owner-chip:active{cursor:grabbing}
.owner-chip:hover{transform:scale(1.05)}
.bar-wrap{margin-top:5px;transition:width .35s ease}
.bar-track{display:flex;border-radius:4px;overflow:hidden;background:var(--bar-bg)}
.bar-seg{height:21px;transition:width .3s ease;display:flex;align-items:center;justify-content:center;font-size:0;font-weight:700;min-width:0;color:var(--bar-text-color);position:relative}
.bar-seg:hover{filter:brightness(1.2)}
.bar-seg[draggable=true]{cursor:grab}.bar-seg[draggable=true]:active{cursor:grabbing}
.bar-seg.drop-target{outline:2px dashed var(--heading);outline-offset:-2px;filter:brightness(1.3)}
.bar-seg.majority{position:relative;overflow:hidden}
.bar-seg.majority::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,rgba(255,255,255,0.22) 0px,rgba(255,255,255,0.22) 1px,transparent 1px,transparent 4px);pointer-events:none;z-index:1}
.bar-labels{display:flex;justify-content:space-between;margin-top:3px}
.bar-label{font-size:10.5px;color:var(--heading)!important;opacity:1;font-weight:500}
.bar-label[onclick]:hover{text-decoration:underline;text-underline-offset:2px}
.summary-table,.cmp-section{margin-top:16px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;transition:all .3s}
.summary-title,.cmp-title{font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:10px;font-family:'Space Grotesk',sans-serif}
.summary-table table,.cmp-section table{width:100%;border-collapse:collapse;font-size:11px}
.summary-table th,.cmp-section th{padding:5px 6px;font-weight:500;color:var(--text-dim)}
.summary-table td,.cmp-section td{padding:4px 6px}
.summary-table thead tr,.cmp-section thead tr{border-bottom:1px solid var(--border)}
.total-row{border-top:2px solid var(--border-hover)}.total-row td{padding:6px;font-weight:700;font-size:12px}
.flash-msg{position:fixed;top:16px;right:16px;padding:10px 18px;border-radius:8px;background:var(--save-bg);color:var(--save-text);border:1px solid var(--save-border);font-size:12px;font-weight:600;font-family:inherit;z-index:999;animation:flashIn .3s ease}
@keyframes flashIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:90}
.ro-banner{background:var(--border);border:1px solid var(--border-hover);border-radius:6px;padding:8px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted)}
.tab-total{font-size:13px;font-weight:700;color:var(--text-muted);font-family:'Space Grotesk',sans-serif;margin-left:auto;white-space:nowrap}

/* ── Mobile ── */
@media(max-width:768px){
  body{padding:10px}
  h1{font-size:18px}
  .subtitle{display:none}
  .header{gap:6px;margin-bottom:10px}
  .header-btns{gap:3px;margin-left:auto}
  .ico-btn{width:28px;height:28px;border-radius:5px}
  .ico-btn svg{width:12px;height:12px}
  .unified-bar{padding:8px 10px;margin-bottom:10px}
  .unified-track{height:auto!important;min-height:65px;max-height:156px}
  .unified-seg .u-pct{font-size:18px}
  .unified-seg .u-val{font-size:10px}
  .unified-seg .u-lbl{font-size:9px}
  .unified-delta{font-size:8px}
  .tab-btn{padding:6px 10px;font-size:10px}
  .tab-row{gap:6px}
  .copy-btn{font-size:10px;padding:4px 8px}
  .asset-row{padding:8px 10px;margin-bottom:3px}
  .asset-top{gap:4px;flex-wrap:nowrap}
  .row-name{font-size:11px;min-width:0;flex-shrink:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px}
  .field-label{display:none}
  .field-val{font-size:10px;padding:1px 3px}
  .val-adj{width:15px;height:15px;font-size:10px}
  .spacer{flex:0 0 0}
  .owners-group{gap:3px;flex-shrink:0}
  .owner-pill{border-radius:4px}
  .adj-btn{width:20px;height:20px;font-size:13px}
  .owner-chip{min-width:38px;font-size:10px;padding:2px 3px}
  .bar-seg{height:30px!important;font-size:10px!important}
  .bar-labels{flex-wrap:nowrap;gap:4px}
  .bar-label{font-size:10px}
  .row-num{min-width:14px;font-size:10px}
  .summary-table{padding:10px 8px}
  .summary-table table{font-size:9px}
  .summary-table th,.summary-table td{padding:3px 3px}
  .cmp-section{padding:10px 8px}
  .cmp-section table{font-size:9px}
  .tab-total{font-size:11px}
  .name-input{width:90px;font-size:11px}
  .check-box{width:14px;height:14px}
  .color-dot{width:18px;height:18px;bottom:3px;right:3px}
}
@media(max-width:480px){
  .unified-track{max-height:130px}
  .unified-seg .u-pct{font-size:15px}
  .unified-seg .u-val{font-size:9px}
  .tab-btn{padding:5px 8px;font-size:9px}
  .copy-btn{font-size:9px;padding:3px 6px;gap:3px}
  .row-name{max-width:70px;font-size:10px}
  .owner-chip{min-width:34px;font-size:9px}
  .adj-btn{width:18px;height:18px;font-size:12px}
  .bar-seg{height:26px!important;font-size:9px!important}
}
</style>
</head>
<body>
<div id="flash" class="flash-msg hidden"></div>
<div id="app"></div>

<script>
/*__STATE_START__*/var INIT_STATE=null;/*__STATE_END__*/
/*__READONLY_START__*/var INIT_LOCKED=false;/*__READONLY_END__*/
/*__TABNAMES_START__*/var INIT_TABNAMES=null;/*__TABNAMES_END__*/
/*__RENAMED_START__*/var INIT_RENAMED=null;/*__RENAMED_END__*/
/*__PASSWORD_START__*/var INIT_PWD=null;/*__PASSWORD_END__*/

var O=["A","B","C"],NN=["One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten"],OK={A:"a",B:"b",C:"c"};
var theme="dark",readOnly=INIT_LOCKED,pLock=INIT_LOCKED,aTab=0,showCmp=false;
var sc=INIT_STATE?P(INIT_STATE):[iS(),eS(),eS(),eS(),eS()];
var tn=INIT_TABNAMES?P(INIT_TABNAMES):["Scenario 1","S_2","S_3","S_4","S_5"];
var sSnap=P(sc),sTSnap=P(tn),dirty=Array(5).fill(false),hist=[],eF=null,eT=null,dS=null,bD=null,smO=false;
var defS=JSON.stringify(iS()),empS=JSON.stringify(eS());
// Track which tabs user explicitly renamed (never auto-rename those)
var userRenamed=INIT_RENAMED?P(INIT_RENAMED):[false,false,false,false,false];
var sortMode="default",sortOpen=false;
var redo=[];
var ownerNames={A:"Owner A",B:"Owner B",C:"Owner C"};
var colorPickerOwner=null;
var editOwnerName=null;
var PALETTE=["#15803d","#22c55e","#0d9488","#06b6d4","#2563eb","#2952cc","#1e40af","#7c3aed","#c084fc","#9333ea","#db2777","#e11d48","#ef4444","#f97316","#f59e0b","#eab308","#b8860b","#84cc16","#6b7280","#374151"];

// Password gate on load
if(INIT_PWD){
  var appDiv=document.getElementById("app");
  appDiv.style.display="none";
  var gate=document.createElement("div");
  gate.id="pwd-gate";
  gate.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Space Grotesk,sans-serif"><div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px;width:300px;text-align:center"><h2 style="color:var(--heading);margin-bottom:16px;font-size:18px">Password Required</h2><input id="pwd-input" type="password" placeholder="Enter password" style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-family:inherit;font-size:14px;text-align:center;margin-bottom:12px" onkeydown="if(event.key===\'Enter\')checkPwd()"><br><button onclick="checkPwd()" style="padding:8px 24px;border-radius:6px;border:none;background:var(--save-bg);color:var(--save-text);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer">Unlock</button><div id="pwd-err" style="color:var(--neg);font-size:12px;margin-top:8px"></div></div></div>';
  document.body.appendChild(gate);
  setTimeout(function(){var inp=document.getElementById("pwd-input");if(inp)inp.focus()},100);
}
function checkPwd(){
  var inp=document.getElementById("pwd-input");if(!inp)return;
  if(inp.value===INIT_PWD){document.getElementById("pwd-gate").remove();document.getElementById("app").style.display=""}
  else{document.getElementById("pwd-err").textContent="Incorrect password";inp.value="";inp.focus()}
}

// Owner name editing
function startOwnerNameEdit(o){if(readOnly||pLock)return;editOwnerName=o;R();setTimeout(function(){var inp=document.getElementById("on-input");if(inp){inp.focus();inp.select()}},10)}
function commitOwnerName(v){if(!editOwnerName)return;if(v)ownerNames[editOwnerName]=v;editOwnerName=null;R()}

document.addEventListener('touchstart',function(e){
